<!DOCTYPE html>
<html>
<head>
<title>Mock Test</title>
</head>

<body style="background:#0f172a;color:white;font-family:sans-serif">

<h2>Mock Test</h2>
<p>Time: <span id="t">60</span></p>

<div id="q"></div>
<button onclick="next()">Next</button>

<h3 id="res"></h3>

<script>
let qs=[
{q:"Binary search complexity?",o:["O(n)","O(log n)","O(n2)"],a:1},
{q:"DBMS stands for?",o:["Data Base","Database Mgmt System","None"],a:1},
{q:"OS manages?",o:["Hardware","Software","Both"],a:2},
{q:"Stack follows?",o:["FIFO","LIFO","None"],a:1},
{q:"HTML used for?",o:["Structure","Style","Logic"],a:0},
];

// make 20 different shuffled
while(qs.length<20){qs.push(...qs)}
qs=qs.slice(0,20).sort(()=>Math.random()-0.5);

let i=0,score=0,time=60;

setInterval(()=>{
time--;
document.getElementById("t").innerText=time;
if(time<=0) end();
},1000);

function load(){
let q=qs[i];
let html=`<p>${i+1}. ${q.q}</p>`;
q.o.forEach((x,j)=>{
html+=`<button onclick="check(${j})">${x}</button>`;
});
document.getElementById("q").innerHTML=html;
}
load();

function check(a){
if(a===qs[i].a) score++;
}

function next(){
i++;
if(i>=20) end();
else load();
}

function end(){
document.getElementById("res").innerText="Score: "+score+"/20";
localStorage.setItem("score",score);
}
</script>

</body>
</html>
