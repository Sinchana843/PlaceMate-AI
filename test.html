<!DOCTYPE html>
<html>
<head>
  <title>Mock Test</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white p-10">

<h1 class="text-3xl mb-5">📝 Mock Test</h1>

<p>1. C is?</p>
<input type="radio" name="q1" value="correct"> Programming Language<br>
<input type="radio" name="q1"> Animal<br><br>

<button onclick="submitTest()" class="bg-blue-500 px-5 py-2 rounded">
Submit Test
</button>

<script>
function submitTest() {
  let score = 0;

  let q1 = document.querySelector('input[name="q1"]:checked');

  if (q1 && q1.value === "correct") score += 100;

  localStorage.setItem("score", score);

  alert("Test submitted!");
  window.location.href = "index.html";
}
</script>

</body>
</html>
