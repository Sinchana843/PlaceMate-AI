<!DOCTYPE html>
<html>
<head>
<title>AI Resume Builder</title>

<style>
body{
  font-family:sans-serif;
  background:linear-gradient(135deg,#0f172a,#1e3a8a);
  color:white;
}

.container{
  display:flex;
  gap:20px;
  padding:20px;
}

.form,.preview{
  flex:1;
  padding:20px;
  border-radius:10px;
  background:rgba(255,255,255,0.1);
}

.preview{
  background:white;
  color:black;
}

img{
  width:100px;
  height:100px;
  border-radius:50%;
}
</style>
</head>

<body>

<h2 style="text-align:center;">Resume Builder</h2>

<div class="container">

<div class="form">

<input id="name" placeholder="Name"><br>
<input id="email" placeholder="Email"><br>
<input id="phone" placeholder="Phone"><br>
<input id="linkedin" placeholder="LinkedIn"><br>

<input type="file" id="photo"><br>

<textarea id="education" placeholder="Education"></textarea><br>
<textarea id="experience" placeholder="Experience"></textarea><br>
<textarea id="skills" placeholder="Skills"></textarea><br>
<textarea id="achievements" placeholder="Achievements"></textarea><br>

<button onclick="generate()">Generate</button>
<button onclick="analyze()">AI Analyze</button>

<p id="result"></p>

</div>

<div class="preview">
  <div id="resume">Preview</div>
</div>

</div>

<script>
let img="";

// FIX IMAGE
document.getElementById("photo").addEventListener("change",function(e){
  let reader=new FileReader();
  reader.onload=function(){
    img=reader.result;
  }
  reader.readAsDataURL(e.target.files[0]);
});

function generate(){
  let name=document.getElementById("name").value;
  let email=document.getElementById("email").value;
  let phone=document.getElementById("phone").value;
  let linkedin=document.getElementById("linkedin").value;
  let education=document.getElementById("education").value;
  let experience=document.getElementById("experience").value;
  let skills=document.getElementById("skills").value;
  let achievements=document.getElementById("achievements").value;

  document.getElementById("resume").innerHTML=`
    <center>
      ${img ? `<img src="${img}">` : ""}
      <h2>${name}</h2>
      <p>${email} | ${phone}</p>
      <p>${linkedin}</p>
    </center>
    <hr>
    <h3>Education</h3><p>${education}</p>
    <h3>Experience</h3><p>${experience}</p>
    <h3>Skills</h3><p>${skills}</p>
    <h3>Achievements</h3><p>${achievements}</p>
  `;
}

// FIX AI ANALYZER
function analyze(){
  let score=0;
  let msg=[];

  if(document.getElementById("skills").value.length>10) score+=25;
  else msg.push("Add more skills");

  if(document.getElementById("experience").value.length>20) score+=25;
  else msg.push("Add experience");

  if(document.getElementById("achievements").value.length>15) score+=25;
  else msg.push("Add achievements");

  if(document.getElementById("linkedin").value.includes("linkedin")) score+=25;
  else msg.push("Add LinkedIn");

  document.getElementById("result").innerText =
    "Score: "+score+"/100 | Suggestions: "+msg.join(", ");
}
</script>

</body>
</html>
