<!DOCTYPE html>
<html>
<head>
  <title>Resume</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white p-10">

<h1 class="text-3xl mb-5">📄 Resume Builder</h1>

<input id="skills" placeholder="Enter skills"
class="p-2 text-black w-full mb-3"><br>

<textarea id="projects" placeholder="Enter projects"
class="p-2 text-black w-full mb-3"></textarea>

<button onclick="analyzeResume()" 
class="bg-green-500 px-5 py-2 rounded">
Analyze Resume
</button>

<p id="result" class="mt-5"></p>

<script>
function analyzeResume() {

  let skills = document.getElementById("skills").value.toLowerCase();
  let projects = document.getElementById("projects").value;

  let score = 50;

  if (skills.includes("dsa")) score += 20;
  if (skills.includes("java") || skills.includes("c")) score += 10;
  if (projects.length > 20) score += 20;

  localStorage.setItem("resumeScore", score);

  document.getElementById("result").innerText =
    "Resume Score: " + score + "%";

  alert("Analysis Done!");
}
</script>

</body>
</html>
